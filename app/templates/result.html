<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Result — Sephora ML Predictor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: url("{{ url_for('static', filename='sephora_bg.png') }}") left center/cover no-repeat;
      ;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .08);
      text-align: center
    }

    .emoji {
      font-size: 3.5rem;
      margin-bottom: 1rem
    }

    .verdict {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: .5rem
    }

    .worth {
      color: #6cffa9
    }

    .over {
      color: #ff6655
    }

    .conf {
      font-size: .9rem;
      color: #888;
      margin-bottom: 1.5rem
    }

    .bar-wrap {
      background: #f0f0f0;
      border-radius: 999px;
      height: 10px;
      margin: 1rem auto 1.5rem;
      max-width: 320px;
      overflow: hidden
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px
    }

    .bar-w {
      background: #6cffa9
    }

    .bar-o {
      background: #ff6655
    }

    .msg {
      font-size: 1rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 2rem;
      padding: 1rem 1.25rem;
      background: #fafafa;
      border-radius: 10px
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem
    }

    .stat {
      background: #fdf6f0;
      border-radius: 10px;
      padding: .85rem
    }

    .stat-v {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a1a
    }

    .stat-l {
      font-size: .75rem;
      color: #999;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: .04em
    }

    a.back {
      display: inline-block;
      padding: .75rem 2rem;
      background: #f049ce;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: .95rem;
      transition: background .2s
    }

    a.back:hover {
      background: #f049ce;
    }

    .err {
      background: #ffeaea;
      border: 1px solid #f5c6c6;
      border-radius: 10px;
      padding: 1rem;
      color: #ff6655;
      font-size: .9rem;
      margin-bottom: 1.5rem
    }
  </style>
</head>

<body>
  <div class="card">
    {% if error %}
    <div class="emoji">⚠️</div>
    <div class="verdict" style="color:#ff6655">Something went wrong</div>
    <div class="err">{{ error }}</div>
    <a href="/" class="back">← Try again</a>
    {% else %}
    <div class="emoji">{{ "✅" if prediction == 1 else "❌" }}</div>
    <div class="verdict {{ 'worth' if prediction == 1 else 'over' }}">{{ label }}</div>
    <div class="conf">{{ confidence }}% confident</div>
    <div class="bar-wrap">
      <div class="bar-fill {{ 'bar-w' if prediction == 1 else 'bar-o' }}" style="width: {{ confidence }}%"></div>
    </div>
    <div class="msg">{{ message }}</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-v">{{ probability }}</div>
        <div class="stat-l">Model probability</div>
      </div>
      <div class="stat">
        <div class="stat-v">{{ confidence }}%</div>
        <div class="stat-l">Confidence score</div>
      </div>
    </div>
    <a href="/" class="back">← Check another product</a>
    {% endif %}
  </div>
</body>

</html>
